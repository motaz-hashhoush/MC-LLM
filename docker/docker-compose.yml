# MC-LLM Inference Infrastructure
# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#   docker compose -f docker/docker-compose.yml up -d
#
# Override settings via .env file.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - llm-net

  # ── vLLM Inference Server ───────────────────────────────────────────────
  vllm:
    image: vllm/vllm-openai:latest
    command: >
      --model /models/${MODEL_NAME} --served-model-name ${MODEL_NAME} --port 8000 --max-model-len ${MAX_MODEL_LEN} --gpu-memory-utilization ${GPU_MEM_UTIL} --dtype ${DTYPE}
    volumes:
      - vllm_models:/models
    expose:
      - "8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    networks:
      - llm-net

  # ── FastAPI Gateway ──────────────────────────────────────────────────────
  fastapi:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      MODEL_NAME: "${MODEL_NAME}"
      REDIS_HOST: "${REDIS_HOST}"
      REDIS_PORT: "${REDIS_PORT}"
      VLLM_ENDPOINT: "${VLLM_ENDPOINT}"
      DATABASE_URL: "${DATABASE_URL}"
      MAX_TOKENS: "${MAX_TOKENS}"
      TEMPERATURE: "${TEMPERATURE}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      vllm:
        condition: service_started
    networks:
      - llm-net

volumes:
  redis_data:
  vllm_models:


networks:
  llm-net:
    driver: bridge
